name: TravelMate CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Tests Frontend & Backend
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Backend
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Test Backend
        run: |
          cd backend
          npm test

      # Setup Frontend
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Test Frontend
        run: |
          cd frontend
          npm test -- --run

      - name: Build Frontend
        run: |
          cd frontend
          # Mock env vars for build if needed to prevent failure
          export VITE_API_URL=http://localhost:3001
          npm run build

  # 2. Deploy Backend to Cloud Run (Only on push to main)
  deploy-backend:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: travelmate-api
          source: ./backend
          region: europe-west1
          # NOTE: env_vars.yaml should ideally be handled via secrets for sensitive data
          # We provide the environment variables directly since env_vars.yaml is ignored securely by git
          env_vars: |-
            NODE_ENV=production
            GOOGLE_CLOUD_PROJECT_ID=travelmate-ynov
            FIREBASE_PROJECT_ID=travelmate-ynov
            GOOGLE_CLOUD_STORAGE_BUCKET=travelmate-ynov-storage
            CORS_ORIGIN=https://travelmate-pi-eight.vercel.app
          flags: '--allow-unauthenticated'

  # 3. Frontend Deployment is handled by Vercel GitHub Integration automatically
  # We just verify the build passed in step 1.
